install:
- cd ~
- wget http://download.java.net/java/jdk9/archive/171/binaries/jdk-9-ea+171_linux-x64_bin.tar.gz
- tar -xzf jdk-9-ea+171_linux-x64_bin.tar.gz
- JAVA_HOME=~/jdk-9
- PATH=$JAVA_HOME/bin:$PATH
- java -version
- cd -
- jshell --show-version bach.jsh
- find target/bach/main/archives
# target/bach/main/archives/de.sormuras.beethoven[.composer|.type|.unit].jar
- mvn install:install-file -Dfile=target/bach/main/archives/de.sormuras.beethoven.jar -DgroupId=$GROUP -DartifactId=beethoven -Dversion=$VERSION -Dpackaging=jar -DgeneratePom=true
- mvn install:install-file -Dfile=target/bach/main/archives/de.sormuras.beethoven.composer.jar -DgroupId=$GROUP -DartifactId=beethoven-composer -Dversion=$VERSION -Dpackaging=jar -DgeneratePom=true
- mvn install:install-file -Dfile=target/bach/main/archives/de.sormuras.beethoven.type.jar -DgroupId=$GROUP -DartifactId=beethoven-type -Dversion=$VERSION -Dpackaging=jar -DgeneratePom=true
- mvn install:install-file -Dfile=target/bach/main/archives/de.sormuras.beethoven.unit.jar -DgroupId=$GROUP -DartifactId=beethoven-unit -Dversion=$VERSION -Dpackaging=jar -DgeneratePom=true
