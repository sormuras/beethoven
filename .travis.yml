sudo: false
dist: trusty

language: java
jdk: oraclejdk9

addons:
  apt:
    packages:
      - oracle-java9-installer

notifications:
  email:
    on_success: always
    on_failure: never

before_install:
- wget --no-check-certificate https://github.com/forax/pro/releases/download/v0.9.160/pro-9-b160-linux.tar.gz
- tar -xzf pro-9-b160-linux.tar.gz

install:
- java -version

script:
- ./pro/bin/pro
