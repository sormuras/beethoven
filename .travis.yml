sudo: false
dist: trusty
language: java

notifications:
  email:
    on_success: always
    on_failure: always

install:
- wget --no-check-certificate https://github.com/forax/pro/releases/download/v0.9.167/pro-9-b167-linux.tar.gz
- tar -xzf pro-9-b167-linux.tar.gz
- export JAVA_HOME=./pro
- ./pro/bin/pro version

script:
- cd .pro
- ../pro/bin/pro

