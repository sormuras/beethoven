sudo: false
dist: trusty
language: java

notifications:
  email:
    on_success: always
    on_failure: always

install:
- cd ~
- wget http://download.java.net/java/jdk9/archive/171/binaries/jdk-9-ea+171_linux-x64_bin.tar.gz
- tar -xzf jdk-9-ea+171_linux-x64_bin.tar.gz
- JAVA_HOME=~/jdk-9
- PATH=$JAVA_HOME/bin:$PATH
- java -version
- cd $TRAVIS_BUILD_DIR

script:
- jshell --show-version bach.jsh
- find target/bach/main/archives
